spring:
  application:
    name: presence-service
  profiles:
    active: local

server:
  port: 8083

# Swagger
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
    enabled: false

---
# Local Profile (로컬 Redis)
spring:
  config:
    activate:
      on-profile: local
  kafka:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    com.jdc.presence: DEBUG

---
# Docker Profile
spring:
  config:
    activate:
      on-profile: docker
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

management:
  tracing:
    enabled: ${TRACING_ENABLED:false}
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://${JAEGER_HOST:jaeger}:4318/v1/traces

logging:
  level:
    com.jdc.presence: INFO

---
# Test Profile
spring:
  config:
    activate:
      on-profile: test
  kafka:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
