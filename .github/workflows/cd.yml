name: CD Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  JAVA_VERSION: '17'
  DOCKER_REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/messaging-engine

jobs:
  # ──────────────── Build & Push Docker Images ────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - gateway-service
          - chat-service
          - query-service
          - presence-service
          - notification-service
          - ai-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build ${{ matrix.service }}
        run: ./gradlew :${{ matrix.service }}:build -x test --no-daemon

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker image
        run: |
          IMAGE="${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}"
          docker build -f ${{ matrix.service }}/Dockerfile -t ${IMAGE}:${{ github.sha }} -t ${IMAGE}:latest .
          docker push ${IMAGE}:${{ github.sha }}
          docker push ${IMAGE}:latest

  # ──────────────── Update Helm Manifests ────────────────
  update-manifests:
    name: Update Helm Image Tag
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          echo "target=${ENV}" >> $GITHUB_OUTPUT
          echo "Deploying to: ${ENV}"

      - name: Update image tag in Helm values
        run: |
          TARGET_FILE="helm/messaging-engine/values-${{ steps.env.outputs.target }}.yaml"
          if [ -f "${TARGET_FILE}" ]; then
            # imageTag가 있으면 교체, 없으면 global 섹션에 추가
            if grep -q "imageTag:" "${TARGET_FILE}"; then
              sed -i "s/imageTag: .*/imageTag: ${{ github.sha }}/" "${TARGET_FILE}"
            else
              sed -i "/^global:/a\\  imageTag: ${{ github.sha }}" "${TARGET_FILE}"
            fi
          else
            echo "Warning: ${TARGET_FILE} not found, using default values.yaml"
            sed -i "s/imageTag: .*/imageTag: ${{ github.sha }}/" helm/messaging-engine/values.yaml
          fi

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          DEPLOY_BRANCH="deploy/${{ steps.env.outputs.target }}"
          git checkout -B "${DEPLOY_BRANCH}"

          git add helm/
          git commit -m "chore(deploy): ${{ steps.env.outputs.target }} 이미지 태그 업데이트 → ${{ github.sha }}"
          git push origin "${DEPLOY_BRANCH}" --force

  # ──────────────── Deployment Summary ────────────────
  deploy-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: update-manifests

    steps:
      - name: Generate summary
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | ${ENV} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image Tag** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | deploy/${ENV} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Actor** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "- \`helm upgrade messaging helm/messaging-engine/ -f helm/messaging-engine/values-${ENV}.yaml\`" >> $GITHUB_STEP_SUMMARY
          echo "- 또는 ArgoCD가 \`deploy/${ENV}\` 브랜치를 감지하여 자동 배포" >> $GITHUB_STEP_SUMMARY
