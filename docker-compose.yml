services:
  # ──────────────── Infrastructure ────────────────

  mysql:
    image: mysql:8.0
    container_name: messaging-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: chat_db
      MYSQL_USER: chat_user
      MYSQL_PASSWORD: chat_pass
      TZ: Asia/Seoul
    volumes:
      - mysql-data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=32M
      --innodb-log-buffer-size=4M
      --key-buffer-size=8M
      --tmp-table-size=8M
      --max-heap-table-size=8M
      --performance-schema=OFF
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: messaging-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: messaging-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms256m"
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  mongodb:
    image: mongo:7.0
    container_name: messaging-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo_user
      MONGO_INITDB_ROOT_PASSWORD: mongo_pass
      MONGO_INITDB_DATABASE: query_db
    volumes:
      - mongodb-data:/data/db
    command: ["mongod", "--wiredTigerCacheSizeGB", "0.25"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: messaging-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────── Monitoring (optional, use: docker compose --profile monitoring up -d) ────────────────

  elasticsearch:
    build:
      context: ./elasticsearch
      dockerfile: Dockerfile
    container_name: messaging-elasticsearch
    profiles: ["full", "search"]
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms384m -Xmx384m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: messaging-jaeger
    profiles: ["full", "monitoring"]
    ports:
      - "16686:16686"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: messaging-prometheus
    profiles: ["full", "monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:10.4.0
    container_name: messaging-grafana
    profiles: ["full", "monitoring"]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

  # ──────────────── Application Services ────────────────

  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    container_name: messaging-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx128m"
      REDIS_HOST: redis
      CHAT_SERVICE_HOST: chat-service
      QUERY_SERVICE_HOST: query-service
      PRESENCE_SERVICE_HOST: presence-service
      AI_SERVICE_HOST: ai-service
      JAEGER_HOST: jaeger
    depends_on:
      redis:
        condition: service_healthy

  chat-service:
    build:
      context: .
      dockerfile: chat-service/Dockerfile
    container_name: messaging-chat
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx128m"
      MYSQL_HOST: mysql
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JAEGER_HOST: jaeger
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy

  query-service:
    build:
      context: .
      dockerfile: query-service/Dockerfile
    container_name: messaging-query
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx128m"
      MONGO_HOST: mongodb
      MONGO_USERNAME: mongo_user
      MONGO_PASSWORD: mongo_pass
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ES_HOST: elasticsearch
      ES_ENABLED: ${ES_ENABLED:-false}
      SPRING_AUTOCONFIGURE_EXCLUDE: ${SPRING_AUTOCONFIGURE_EXCLUDE:-org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration,org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration,org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchClientAutoConfiguration,org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration}
      JAEGER_HOST: jaeger
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy

  presence-service:
    build:
      context: .
      dockerfile: presence-service/Dockerfile
    container_name: messaging-presence
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx96m"
      REDIS_HOST: redis
      JAEGER_HOST: jaeger
    depends_on:
      redis:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: messaging-notification
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx96m"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JAEGER_HOST: jaeger
      SLACK_ENABLED: "false"
    depends_on:
      kafka:
        condition: service_healthy

  ai-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    container_name: messaging-ai
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx96m"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JAEGER_HOST: jaeger
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  mysql-data:
  mongodb-data:
  redis-data:
  elasticsearch-data:
  prometheus-data:
  grafana-data:
