apiVersion: v1
kind: ConfigMap
metadata:
  name: messaging-config
  namespace: messaging-engine
  labels:
    app.kubernetes.io/part-of: messaging-engine
data:
  # Spring
  SPRING_PROFILES_ACTIVE: "docker"

  # MySQL (chat-service)
  MYSQL_HOST: "mysql"
  MYSQL_PORT: "3306"

  # MongoDB (query-service)
  MONGO_HOST: "mongodb"
  MONGO_PORT: "27017"

  # Redis (gateway, presence)
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"

  # Kafka
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"

  # Elasticsearch
  ES_HOST: "elasticsearch"
  ES_PORT: "9200"
  ES_ENABLED: "false"

  # Tracing
  TRACING_ENABLED: "false"
  JAEGER_HOST: "jaeger"

  # Service discovery (gateway routing)
  CHAT_SERVICE_HOST: "chat-service"
  QUERY_SERVICE_HOST: "query-service"
  PRESENCE_SERVICE_HOST: "presence-service"
  AI_SERVICE_HOST: "ai-service"

  # Notification
  SLACK_ENABLED: "false"
