apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: messaging-engine
  labels:
    app: ai-service
    app.kubernetes.io/part-of: messaging-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8085"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: ai-service
          image: ghcr.io/messaging-engine/ai-service:latest
          ports:
            - containerPort: 8085
          envFrom:
            - configMapRef:
                name: messaging-config
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 192Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 60
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: messaging-engine
  labels:
    app: ai-service
spec:
  selector:
    app: ai-service
  ports:
    - port: 8085
      targetPort: 8085
      protocol: TCP
  type: ClusterIP
