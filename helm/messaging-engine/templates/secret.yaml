apiVersion: v1
kind: Secret
metadata:
  name: messaging-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "messaging-engine.labels" . | nindent 4 }}
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: {{ .Values.secrets.mysqlRootPassword | quote }}
  MYSQL_USER: {{ .Values.secrets.mysqlUser | quote }}
  MYSQL_PASSWORD: {{ .Values.secrets.mysqlPassword | quote }}
  MONGO_USERNAME: {{ .Values.secrets.mongoUsername | quote }}
  MONGO_PASSWORD: {{ .Values.secrets.mongoPassword | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
