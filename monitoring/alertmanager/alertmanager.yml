global:
  resolve_timeout: 5m

route:
  receiver: 'default'
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: 'default'
    # 실제 운영 시 Slack, PagerDuty 등 연동
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/...'
    #     channel: '#alerts'
    webhook_configs:
      - url: 'http://localhost:9095/alertmanager/webhook'
        send_resolved: true
