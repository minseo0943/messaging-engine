spring:
  application:
    name: gateway-service
  profiles:
    active: local

server:
  port: 8080

# JWT
jwt:
  secret: ${JWT_SECRET:messaging-engine-jwt-secret-key-must-be-at-least-32-bytes-long}
  access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION:900000}     # 15분
  refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000} # 7일

# OAuth2 Kakao (비활성화 기본값, 환경변수로 활성화)
oauth2:
  kakao:
    enabled: ${KAKAO_OAUTH_ENABLED:false}
    client-id: ${KAKAO_CLIENT_ID:your-kakao-client-id}
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8080/api/auth/kakao/callback}

# Gateway
gateway:
  rate-limit:
    max-requests: 300              # 미인증 (IP 기반)
    authenticated-max-requests: 500 # 인증 사용자 (userId 기반)
    window-seconds: 60
  services:
    chat-service: ${CHAT_SERVICE_URL:http://localhost:8081}
    query-service: ${QUERY_SERVICE_URL:http://localhost:8082}
    presence-service: ${PRESENCE_SERVICE_URL:http://localhost:8083}
    ai-service: ${AI_SERVICE_URL:http://localhost:8085}

# Swagger
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
    enabled: false

---
# Local Profile
spring:
  config:
    activate:
      on-profile: local
  kafka:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    com.jdc.gateway: DEBUG

---
# Docker Profile
spring:
  config:
    activate:
      on-profile: docker
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    consumer:
      group-id: gateway-websocket
      auto-offset-reset: latest
      enable-auto-commit: false
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

gateway:
  services:
    chat-service: http://${CHAT_SERVICE_HOST:chat-service}:8081
    query-service: http://${QUERY_SERVICE_HOST:query-service}:8082
    presence-service: http://${PRESENCE_SERVICE_HOST:presence-service}:8083
    ai-service: http://${AI_SERVICE_HOST:ai-service}:8085

management:
  tracing:
    enabled: ${TRACING_ENABLED:false}
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://${JAEGER_HOST:jaeger}:4318/v1/traces

logging:
  level:
    com.jdc.gateway: INFO
